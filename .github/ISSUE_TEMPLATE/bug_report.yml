name: "🐛 Bug report"
description: Something in the app is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Select ...
        3. See error
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Employee mode
        - Freelancer — Service Contract
        - Freelancer — Household Business
        - Theme / dark mode
        - Language / translations
        - Other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 130 on macOS, Safari on iPhone
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or extra context
